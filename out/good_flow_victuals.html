    function colorForGood(good) {

          swatch.style.backgroundColor = "#ffffff";
          swatch.style.borderColor = style.color;
          swatch.style.borderStyle = style.borderStyle;
          const label = document.createElement("span");
          label.className = "legend-label";
          label.textContent = style.label;
          label.title = style.label;
          const count = document.createElement("span");
          count.className = "legend-count";
          count.textContent = style.count;
          item.append(swatch, label, count);
          container.append(item);
      }
    }
    buildLegend();
    const spreadLayout = {
      name: "fcose",
      quality: "proof",
      randomize: true,
      animate: false,
      fit: true,
      padding: 100,
      nodeDimensionsIncludeLabels: true,
      nodeSeparation: 120,
      idealEdgeLength: edge => edge.data("kind") === "produces" ? 220 : 260,
      nodeRepulsion: 18000,
      gravity: 0.08,
      gravityRangeCompound: 1.5,
      gravityCompound: 0.2,
      nestingFactor: 0.1,
      numIter: 8000,
      tile: true,
      tilingPaddingVertical: 40,
      tilingPaddingHorizontal: 40
    };
    const rankedLayout = {
      name: "dagre",
      rankDir: "LR",
      ranker: "network-simplex",
      nodeSep: 130,
      edgeSep: 48,
      rankSep: 260,
      fit: true,
      padding: 80,
      animate: false
    };
    const columnLayout = { name: "preset", fit: true, padding: 80 };
    const cy = cytoscape({
      container: document.getElementById("cy"),
      elements: [...graph.nodes, ...graph.edges],
      layout: spreadLayout,
      minZoom: 0.35,
      maxZoom: 2.5,
      wheelSensitivity: 0.08,
      style: [{"selector": "node", "style": {"font-family": "Inter, Segoe UI, sans-serif", "font-size": "12px", "label": "data(label)", "text-halign": "center", "text-valign": "center", "text-wrap": "wrap", "text-max-width": "120px", "width": "label", "height": "label", "padding": "12px", "border-width": 4, "border-color": "data(provenance_color)", "border-style": "data(provenance_border_style)", "background-color": "#f8fafc", "color": "#172033", "shape": "round-rectangle"}}, {"selector": ".good", "style": {"background-color": "data(goods_color)", "border-color": "data(provenance_color)", "border-width": 4, "color": "#ffffff", "font-weight": "700", "text-outline-color": "data(goods_color)", "text-outline-width": 1}}, {"selector": ".selected", "style": {"border-width": 6, "color": "#ffffff", "font-weight": "700"}}, {"selector": ".production-method", "style": {"background-color": "#ecfdf5", "border-color": "data(provenance_color)", "border-width": 4, "padding": "12px", "shape": "round-rectangle", "text-max-width": "220px"}}, {"selector": ".building", "style": {"background-color": "#f1f5f9", "text-max-width": "170px"}}, {"selector": "edge", "style": {"curve-style": "bezier", "control-point-step-size": 56, "font-size": "11px", "label": "data(label)", "line-color": "data(goods_color)", "opacity": 0.7, "target-arrow-color": "data(goods_color)", "target-arrow-shape": "triangle", "text-background-color": "#ffffff", "text-background-opacity": 0.9, "text-background-padding": "3px", "width": "data(edge_width)"}}, {"selector": ".produces", "style": {"target-arrow-shape": "triangle"}}]
    });
    window.cy = cy;
    function runSpreadLayout() {
      cy.layout(spreadLayout).run();
    }
    function runRankedLayout() {
      cy.layout(rankedLayout).run();
    }
    function runColumnLayout() {
      cy.layout(columnLayout).run();
    }
    window.runSpreadLayout = runSpreadLayout;
    window.runRankedLayout = runRankedLayout;
    window.runColumnLayout = runColumnLayout;
    cy.ready(() => {
      runSpreadLayout();
      cy.fit(undefined, 80);
    });
  </script>
</body>
