<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>EU5 Goods Flow: fur</title>
  <script src="https://unpkg.com/cytoscape@3.30.4/dist/cytoscape.min.js"></script>
  <script src="https://unpkg.com/layout-base@2.0.1/layout-base.js"></script>
  <script src="https://unpkg.com/cose-base@2.2.0/cose-base.js"></script>
  <script src="https://unpkg.com/cytoscape-fcose@2.2.0/cytoscape-fcose.js"></script>
  <script src="https://unpkg.com/dagre@0.8.5/dist/dagre.min.js"></script>
  <script src="https://unpkg.com/cytoscape-dagre@2.5.0/cytoscape-dagre.js"></script>
  <style>
    * { box-sizing: border-box; }
    html, body { height: 100%; margin: 0; }
    body {
      font-family: Inter, Segoe UI, system-ui, sans-serif;
      background: #f8fafc;
      color: #172033;
      overflow: hidden;
    }
    .shell {
      display: grid;
      grid-template-rows: auto 1fr;
      height: 100vh;
      width: 100vw;
    }
    header {
      align-items: center;
      background: #ffffff;
      border-bottom: 1px solid #dbe4ef;
      display: flex;
      gap: 16px;
      min-height: 58px;
      padding: 10px 18px;
    }
    h1 {
      font-size: 16px;
      font-weight: 700;
      line-height: 1.2;
      margin: 0;
    }
    .meta {
      color: #64748b;
      font-size: 13px;
    }
    .spacer { flex: 1; }
    .controls {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      justify-content: flex-end;
    }
    button {
      background: #ffffff;
      border: 1px solid #cbd5e1;
      border-radius: 6px;
      color: #172033;
      cursor: pointer;
      font: inherit;
      font-size: 13px;
      padding: 7px 10px;
    }
    button:hover { background: #f1f5f9; }
    #cy {
      height: 100%;
      width: 100%;
    }
  </style>
</head>
<body>
  <div class="shell">
    <header>
      <h1>fur</h1>
      <div class="meta">7 nodes &middot; 6 edges</div>
      <div class="spacer"></div>
      <div class="controls">
        <button type="button" onclick="runSpreadLayout()">Spread</button>
        <button type="button" onclick="runRankedLayout()">Ranked</button>
        <button type="button" onclick="runColumnLayout()">Columns</button>
        <button type="button" onclick="cy.fit(undefined, 80)">Fit</button>
        <button type="button" onclick="cy.zoom(cy.zoom() * 1.2)">Zoom In</button>
        <button type="button" onclick="cy.zoom(cy.zoom() / 1.2)">Zoom Out</button>
      </div>
    </header>
    <div id="cy"></div>
  </div>
  <script>
    const graph = {"nodes": [{"data": {"id": "good:fur", "label": "fur", "kind": "good", "level": 0}, "classes": "good selected", "position": {"x": 0, "y": 0.0}}, {"data": {"id": "production_method:pp_fur_trapping", "label": "pp_fur_trapping\nforest_village", "kind": "production_method", "production_method": "pp_fur_trapping", "building": "forest_village", "source_layer": "vanilla", "source_mod": null, "level": -1}, "classes": "production-method", "position": {"x": -320, "y": 0.0}}, {"data": {"id": "good:tools", "label": "tools", "kind": "good", "level": -2}, "classes": "good", "position": {"x": -640, "y": -56.0}}, {"data": {"id": "good:weaponry", "label": "weaponry", "kind": "good", "level": -2}, "classes": "good", "position": {"x": -640, "y": 56.0}}, {"data": {"id": "production_method:bolshoi_theater_maintenance", "label": "bolshoi_theater_maintenance\nbolshoi_theater", "kind": "production_method", "production_method": "bolshoi_theater_maintenance", "building": "bolshoi_theater", "source_layer": "vanilla", "source_mod": null, "level": 1}, "classes": "production-method", "position": {"x": 320, "y": -78.0}}, {"data": {"id": "production_method:pp_cookery_boreal_hunter_stew", "label": "pp_cookery_boreal_hunter_stew\ncookery", "kind": "production_method", "production_method": "pp_cookery_boreal_hunter_stew", "building": "cookery", "source_layer": "vanilla", "source_mod": null, "level": 1}, "classes": "production-method", "position": {"x": 320, "y": 78.0}}, {"data": {"id": "good:victuals", "label": "victuals", "kind": "good", "level": 2}, "classes": "good", "position": {"x": 640, "y": 78.0}}], "edges": [{"data": {"id": "production_method:pp_fur_trapping->good:fur:produces", "source": "production_method:pp_fur_trapping", "target": "good:fur", "label": "0.25", "kind": "produces", "goods": "fur"}, "classes": "produces"}, {"data": {"id": "good:tools->production_method:pp_fur_trapping:consumes", "source": "good:tools", "target": "production_method:pp_fur_trapping", "label": "0.05", "kind": "consumes", "goods": "tools"}, "classes": "consumes"}, {"data": {"id": "good:weaponry->production_method:pp_fur_trapping:consumes", "source": "good:weaponry", "target": "production_method:pp_fur_trapping", "label": "0.08", "kind": "consumes", "goods": "weaponry"}, "classes": "consumes"}, {"data": {"id": "good:fur->production_method:bolshoi_theater_maintenance:consumes", "source": "good:fur", "target": "production_method:bolshoi_theater_maintenance", "label": "0.1", "kind": "consumes", "goods": "fur"}, "classes": "consumes"}, {"data": {"id": "good:fur->production_method:pp_cookery_boreal_hunter_stew:consumes", "source": "good:fur", "target": "production_method:pp_cookery_boreal_hunter_stew", "label": "2.3", "kind": "consumes", "goods": "fur"}, "classes": "consumes"}, {"data": {"id": "production_method:pp_cookery_boreal_hunter_stew->good:victuals:produces", "source": "production_method:pp_cookery_boreal_hunter_stew", "target": "good:victuals", "label": "1.65", "kind": "produces", "goods": "victuals"}, "classes": "produces"}]};
    function colorForGood(good) {
      if (!good) return "#94a3b8";
      const palette = [
        "#2563eb", "#dc2626", "#16a34a", "#ca8a04", "#9333ea", "#0891b2",
        "#ea580c", "#4f46e5", "#be123c", "#0f766e", "#7c3aed", "#65a30d",
        "#c2410c", "#0284c7", "#a21caf", "#15803d", "#b45309", "#1d4ed8"
      ];
      let hash = 0;
      for (let index = 0; index < good.length; index += 1) {
        hash = ((hash << 5) - hash + good.charCodeAt(index)) | 0;
      }
      return palette[Math.abs(hash) % palette.length];
    }
    for (const node of graph.nodes) {
      if (node.data.kind === "good") {
        node.data.goods_color = colorForGood(node.data.label);
      }
    }
    for (const edge of graph.edges) {
      edge.data.goods_color = colorForGood(edge.data.goods);
    }
    const spreadLayout = {
      name: "fcose",
      quality: "proof",
      randomize: true,
      animate: false,
      fit: true,
      padding: 100,
      nodeDimensionsIncludeLabels: true,
      nodeSeparation: 120,
      idealEdgeLength: edge => edge.data("kind") === "produces" ? 220 : 260,
      nodeRepulsion: 18000,
      gravity: 0.08,
      gravityRangeCompound: 1.5,
      gravityCompound: 0.2,
      nestingFactor: 0.1,
      numIter: 8000,
      tile: true,
      tilingPaddingVertical: 40,
      tilingPaddingHorizontal: 40
    };
    const rankedLayout = {
      name: "dagre",
      rankDir: "LR",
      ranker: "network-simplex",
      nodeSep: 130,
      edgeSep: 48,
      rankSep: 260,
      fit: true,
      padding: 80,
      animate: false
    };
    const columnLayout = { name: "preset", fit: true, padding: 80 };
    const cy = cytoscape({
      container: document.getElementById("cy"),
      elements: [...graph.nodes, ...graph.edges],
      layout: spreadLayout,
      minZoom: 0.35,
      maxZoom: 2.5,
      wheelSensitivity: 0.08,
      style: [{"selector": "node", "style": {"font-family": "Inter, Segoe UI, sans-serif", "font-size": "12px", "label": "data(label)", "text-halign": "center", "text-valign": "center", "text-wrap": "wrap", "text-max-width": "120px", "width": "label", "height": "label", "padding": "12px", "border-width": 1, "border-color": "#ccd5df", "background-color": "#f8fafc", "color": "#172033", "shape": "round-rectangle"}}, {"selector": ".good", "style": {"background-color": "data(goods_color)", "border-color": "data(goods_color)", "color": "#ffffff", "font-weight": "700", "text-outline-color": "data(goods_color)", "text-outline-width": 1}}, {"selector": ".selected", "style": {"border-color": "#172033", "border-width": 2, "color": "#ffffff", "font-weight": "700"}}, {"selector": ".production-method", "style": {"background-color": "#ecfdf5", "border-color": "#10b981", "padding": "16px", "shape": "round-diamond", "text-max-width": "156px"}}, {"selector": "edge", "style": {"curve-style": "bezier", "control-point-step-size": 56, "font-size": "11px", "label": "data(label)", "line-color": "data(goods_color)", "opacity": 0.7, "target-arrow-color": "data(goods_color)", "target-arrow-shape": "triangle", "text-background-color": "#ffffff", "text-background-opacity": 0.9, "text-background-padding": "3px", "width": 2}}, {"selector": ".produces", "style": {"width": 2.5}}]
    });
    window.cy = cy;
    function runSpreadLayout() {
      cy.layout(spreadLayout).run();
    }
    function runRankedLayout() {
      cy.layout(rankedLayout).run();
    }
    function runColumnLayout() {
      cy.layout(columnLayout).run();
    }
    window.runSpreadLayout = runSpreadLayout;
    window.runRankedLayout = runRankedLayout;
    window.runColumnLayout = runColumnLayout;
    cy.ready(() => {
      runSpreadLayout();
      cy.fit(undefined, 80);
    });
  </script>
</body>
</html>
